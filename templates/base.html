<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NLP Sentiment Analysis Dashboard — Analyze Google Play Store reviews with Machine Learning">
    <title>{% block title %}NLP Sentiment Dashboard{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                <span class="navbar-brand-icon">🧠</span>SentimentIQ
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.endpoint == 'dashboard' %}active{% endif %}"
                           href="/" id="nav-dashboard">
                            <i class="bi bi-grid-1x2-fill me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.endpoint == 'sentiment_checker' %}active{% endif %}"
                           href="/checker" id="nav-checker">
                            <i class="bi bi-chat-dots-fill me-1"></i>Sentiment Checker
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ── Main Content ────────────────────────────────────────────────────── -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ── Footer ──────────────────────────────────────────────────────────── -->
    <footer class="footer-custom">
        <div class="container">
            <p>🧠 <strong>SentimentIQ</strong> — NLP Sentiment Analysis Dashboard</p>
            <p>Built with Flask, scikit-learn, Chart.js & Bootstrap 5</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
